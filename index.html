<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Coordinates Trainer</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --primary: #4CAF50; --accent: #ffeb3b;
            --text: #ffffff; --text-muted: #aaaaaa; --light-cell: #f0d9b5; --light-text: #b58863;
            --dark-cell: #b58863; --dark-text: #f0d9b5;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; user-select: none; -webkit-user-select: none;
        }
        .app-container { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 20px; margin: 0; color: var(--primary); }
        select { background: var(--card-bg); color: var(--text); border: 1px solid #444; padding: 6px 10px; border-radius: 5px; font-size: 14px; cursor: pointer; outline: none; }
        .settings-panel { background: var(--card-bg); border-radius: 10px; padding: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; text-align: left; }
        .setting-item { display: flex; flex-direction: column; gap: 4px; }
        .setting-item label { color: var(--text-muted); font-weight: 500; }
        .settings-panel select { width: 100%; box-sizing: border-box; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 5px; }
        .checkbox-item input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--primary); }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 16px; background: var(--card-bg); padding: 10px; border-radius: 10px; }
        .target-box { font-size: 56px; font-weight: bold; margin-bottom: 15px; color: var(--accent); text-shadow: 0 0 10px rgba(255, 235, 59, 0.2); height: 65px; display: flex; align-items: center; justify-content: center; }
        .board-wrapper { position: relative; width: 100%; aspect-ratio: 1 / 1; margin-bottom: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 4px solid #333; box-sizing: border-box; }
        .chessboard { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; cursor: pointer; position: relative; transition: background-color 0.1s ease; }
        .light { background-color: var(--light-cell); color: var(--light-text); }
        .dark { background-color: var(--dark-cell); color: var(--dark-text); }
        .cell:active { opacity: 0.7; }
        .cell-label { display: none; pointer-events: none; }
        .border-labels { display: none; position: absolute; pointer-events: none; font-size: 10px; font-weight: bold; }
        .light .border-labels { color: var(--light-text); }
        .dark .border-labels { color: var(--dark-text); }
        .label-file { bottom: 2px; right: 4px; }
        .label-rank { top: 2px; left: 4px; }
        .show-cell-labels .cell-label { display: block; }
        .show-border-labels .border-labels { display: block; }
        .rtl { direction: rtl; text-align: right; }
        .rtl .settings-panel { text-align: right; }
    </style>
</head>
<body>
    <div class="app-container" id="app-body">
        <div class="header">
            <h1 id="ui-title">Chess Trainer</h1>
            <select id="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option><option value="ru">Русский</option><option value="es">Español</option><option value="fr">Français</option><option value="de">Deutsch</option><option value="it">Italiano</option><option value="pt">Português</option><option value="tr">Türkçe</option><option value="zh">中文</option><option value="ar">العربية</option>
            </select>
        </div>
        <div class="settings-panel">
            <div class="setting-item">
                <label id="ui-label-side">Side</label>
                <select id="side-select" onchange="initGame()"><option value="white" id="ui-opt-white">White</option><option value="black" id="ui-opt-black">Black</option></select>
            </div>
            <div class="setting-item">
                <label id="ui-label-mode">Mode</label>
                <select id="mode-select" onchange="initGame()"><option value="30" id="ui-opt-30">30 seconds</option><option value="infinite" id="ui-opt-inf">Infinite</option></select>
            </div>
            <div class="checkbox-item"><input type="checkbox" id="border-coord-check" onchange="toggleBorderLabels()"><label for="border-coord-check" id="ui-check-border">Borders</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cell-coord-check" onchange="toggleCellLabels()"><label for="cell-coord-check" id="ui-check-cells">Cells</label></div>
        </div>
        <div class="stats">
            <div><span id="ui-stat-score">Score</span>: <span id="score">0</span></div>
            <div><span id="ui-stat-record">Record</span>: <span id="highscore">0</span></div>
            <div><span id="ui-stat-time">Time</span>: <span id="timer">30</span></div>
        </div>
        <div class="target-box" id="target">??</div>
        <div class="board-wrapper"><div class="chessboard" id="board"></div></div>
    </div>
    <script>
        const languages = {
            en: { title: "Chess Trainer", score: "Score", record: "Record", time: "Time", side: "Side", mode: "Mode", white: "White", black: "Black", opt30: "30 seconds", optInf: "Infinite", checkBorder: "Borders", checkCells: "Cells", alertNew: "New Record! Score: ", alertTime: "Time up! Score: " },
            ru: { title: "Шахматный Тренер", score: "Очки", record: "Рекорд", time: "Время", side: "Сторона", mode: "Режим", white: "Белые", black: "Черные", opt30: "30 секунд", optInf: "Бесконечно", checkBorder: "По краям", checkCells: "На клетках", alertNew: "Новый рекорд! Очки: ", alertTime: "Время вышло! Очки: " },
            es: { title: "Entrenador", score: "Puntos", record: "Récord", time: "Tiempo", side: "Bando", mode: "Modo", white: "Blancas", black: "Negras", opt30: "30 segundos", optInf: "Infinito", checkBorder: "Bordes", checkCells: "Casillas", alertNew: "¡Nuevo récord! Puntos: ", alertTime: "¡Tiempo agotado! Puntos: " },
            fr: { title: "Entraîneur", score: "Score", record: "Record", time: "Temps", side: "Camp", mode: "Mode", white: "Blancs", black: "Noirs", opt30: "30 secondes", optInf: "Infini", checkBorder: "Bordures", checkCells: "Cases", alertNew: "Nouveau record! Score: ", alertTime: "Temps écoulé! Score: " },
            de: { title: "Schachtrainer", score: "Punkte", record: "Rekord", time: "Zeit", side: "Seite", mode: "Modus", white: "Weiß", black: "Schwarz", opt30: "30 Sekunden", optInf: "Endlos", checkBorder: "Ränder", checkCells: "Felder", alertNew: "Neuer Rekord! Punkte: ", alertTime: "Zeit abgelaufen! Punkte: " },
            it: { title: "Allenatore", score: "Punti", record: "Record", time: "Tempo", side: "Lato", mode: "Modo", white: "Bianchi", black: "Neri", opt30: "30 secondi", optInf: "Infinito", checkBorder: "Bordi", checkCells: "Case", alertNew: "Nuovo record! Punti: ", alertTime: "Tempo scaduto! Punti: " },
            pt: { title: "Treinador", score: "Pontos", record: "Recorde", time: "Tempo", side: "Lado", mode: "Modo", white: "Brancas", black: "Negras", opt30: "30 segundos", optInf: "Infinito", checkBorder: "Bordas", checkCells: "Casas", alertNew: "Novo recorde! Pontos: ", alertTime: "Tempo esgotado! Pontos: " },
            tr: { title: "Satranç Antrenörü", score: "Skor", record: "Rekor", time: "Süre", side: "Taraf", mode: "Mod", white: "Beyaz", black: "Siyah", opt30: "30 saniye", optInf: "Sonsuz", checkBorder: "Kenarlar", checkCells: "Kareler", alertNew: "Yeni Rekor! Skor: ", alertTime: "Süre bitti! Skor: " },
            zh: { title: "象棋坐标訓練", score: "得分", record: "纪录", time: "时间", side: "阵营", mode: "模式", white: "白棋", black: "黑棋", opt30: "30秒", optInf: "无限", checkBorder: "边缘坐标", checkCells: "棋盘坐标", alertNew: "新纪录！得分: ", alertTime: "时间 Performance！得分: " },
            ar: { title: "مدرب الشطرنج", score: "النقاط", record: "الرقم القياسي", time: "الوقت", side: "الجانب", mode: "الوضع", white: "أبيض", black: "أسود", opt30: "30 ثانية", optInf: "لا نهائي", checkBorder: "الحواف", checkCells: "المربعات", alertNew: "رقم قياسي جديد! النقاط: ", alertTime: "انتهى الوقت! النقاط: " }
        };
        let currentLang = 'en'; const board = document.getElementById('board'); const targetBox = document.getElementById('target');
        const scoreBox = document.getElementById('score'); const highscoreBox = document.getElementById('highscore'); const timerBox = document.getElementById('timer');
        const filesArr = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h']; const ranksArr = ['8', '7', '6', '5', '4', '3', '2', '1'];
        let allCoordinates = []; let score = 0; let highscore = 0; let timeLeft = 30; let currentTarget = ''; let gameInterval = null; let isPlaying = false;

        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext; if (!AudioContext) return;
                const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'success') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime); gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08); osc.start(); osc.stop(ctx.currentTime + 0.08);
                } else if (type === 'error') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(130, ctx.currentTime); gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); osc.start(); osc.stop(ctx.currentTime + 0.15);
                }
            } catch (e) { console.log(e); }
        }

        function changeLanguage(lang) {
            currentLang = lang; localStorage.setItem('chess_lang', lang); document.getElementById('lang-select').value = lang;
            const appBody = document.getElementById('app-body'); if (lang === 'ar') appBody.classList.add('rtl'); else appBody.classList.remove('rtl');
            document.getElementById('ui-title').innerText = languages[lang].title; document.getElementById('ui-label-side').innerText = languages[lang].side;
            document.getElementById('ui-label-mode').innerText = languages[lang].mode; document.getElementById('ui-opt-white').innerText = languages[lang].white;
            document.getElementById('ui-opt-black').innerText = languages[lang].black; document.getElementById('ui-opt-30').innerText = languages[lang].opt30;
            document.getElementById('ui-opt-inf').innerText = languages[lang].optInf; document.getElementById('ui-check-border').innerText = languages[lang].checkBorder;
            document.getElementById('ui-check-cells').innerText = languages[lang].checkCells; document.getElementById('ui-stat-score').innerText = languages[lang].score;
            document.getElementById('ui-stat-record').innerText = languages[lang].record; document.getElementById('ui-stat-time').innerText = languages[lang].time;
            if (document.getElementById('mode-select').value === 'infinite') timerBox.innerText = '∞';
        }

        function toggleCellLabels() { const check = document.getElementById('cell-coord-check').checked; board.classList.toggle('show-cell-labels', check); localStorage.setItem('chess_show_cells', check); }
        function toggleBorderLabels() { const check = document.getElementById('border-coord-check').checked; board.classList.toggle('show-border-labels', check); localStorage.setItem('chess_show_borders', check); }

        function createBoard() {
            board.innerHTML = ''; allCoordinates = []; const side = document.getElementById('side-select').value;
            const ranks = side === 'white' ? [...ranksArr] : [...ranksArr].reverse(); const files = side === 'white' ? [...filesArr] : [...filesArr].reverse();
            for (let r = 0; r < ranks.length; r++) {
                for (let f = 0; f < files.length; f++) {
                    const coordinate = files[f] + ranks[r]; allCoordinates.push(coordinate); const cell = document.createElement('div'); cell.classList.add('cell');
                    if ((r + f) % 2 === 0) cell.classList.add('light'); else cell.classList.add('dark');
                    cell.dataset.coord = coordinate; const cellLabel = document.createElement('span'); cellLabel.classList.add('cell-label'); cellLabel.innerText = coordinate; cell.appendChild(cellLabel);
                    if (r === 7) { const fileLabel = document.createElement('span'); fileLabel.classList.add('border-labels', 'label-file'); fileLabel.innerText = files[f]; cell.appendChild(fileLabel); }
                    if (f === 0) { const rankLabel = document.createElement('span'); rankLabel.classList.add('border-labels', 'label-rank'); rankLabel.innerText = ranks[r]; cell.appendChild(rankLabel); }
                    cell.addEventListener('click', () => handleCellClick(coordinate, cell)); board.appendChild(cell);
                }
            }
        }

        function nextTarget() { const randomIndex = Math.floor(Math.random() * allCoordinates.length); currentTarget = allCoordinates[randomIndex]; targetBox.innerText = currentTarget; }

        function initGame() {
            clearInterval(gameInterval); score = 0; isPlaying = false; scoreBox.innerText = score;
            const mode = document.getElementById('mode-select').value;
            if (mode === 'infinite') { timeLeft = Infinity; timerBox.innerText = '∞'; } else { timeLeft = 30; timerBox.innerText = timeLeft; }
            createBoard(); nextTarget(); loadHighscore();
        }

        function startTimer() {
            isPlaying = true; if (document.getElementById('mode-select').value === 'infinite') return;
            gameInterval = setInterval(() => {
                timeLeft--; timerBox.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameInterval); isPlaying = false; const side = document.getElementById('side-select').value; const recordKey = `chess_highscore_${side}`;
                    if (score > highscore) { highscore = score; localStorage.setItem(recordKey, highscore); highscoreBox.innerText = highscore; alert(languages[currentLang].alertNew + score); }
                    else { alert(languages[currentLang].alertTime + score); }
                    initGame();
                }
            }, 1000);
        }

        function handleCellClick(clickedCoord, cellElement) {
            if (timeLeft <= 0) return;
            if (!isPlaying && score === 0) startTimer();
            if (clickedCoord === currentTarget) {
                score++; scoreBox.innerText = score; playSound('success'); cellElement.style.backgroundColor = '#2ecc71';
                setTimeout(() => cellElement.style.backgroundColor = '', 150); nextTarget();
            } else {
                playSound('error'); cellElement.style.backgroundColor = '#e74c3c'; setTimeout(() => cellElement.style.backgroundColor = '', 150);
            }
        }

        function loadHighscore() { const side = document.getElementById('side-select').value; const savedScore = localStorage.getItem(`chess_highscore_${side}`); highscore = savedScore ? parseInt(savedScore) : 0; highscoreBox.innerText = highscore; }
        function loadSettings() {
            const savedLang = localStorage.getItem('chess_lang') || 'en'; changeLanguage(savedLang);
            const showCells = localStorage.getItem('chess_show_cells') === 'true'; document.getElementById('cell-coord-check').checked = showCells; board.classList.toggle('show-cell-labels', showCells);
            const showBorders = localStorage.getItem('chess_show_borders') === 'true'; document.getElementById('border-coord-check').checked = showBorders; board.classList.toggle('show-border-labels', showBorders);
        }
        loadSettings(); initGame();
    </script>
</body>
</html>
